name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle_args: --bundles app
            artifact_name: bundles-macos
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
            build_dmg: true
            release_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            bundle_args: --bundles msi,nsis
            artifact_name: bundles-windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            build_dmg: false
            release_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Ghostscript (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ghostscript

      - name: Install Ghostscript (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ghostscript --no-progress -y

      - name: Resolve GS_WIN_DIR (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $programFiles = $env:ProgramFiles
          $programFilesX86 = [System.Environment]::GetEnvironmentVariable('ProgramFiles(x86)')
          $basePaths = @($programFiles, $programFilesX86) | Where-Object { $_ -and (Test-Path $_) }
          $resolved = $null
          foreach ($base in $basePaths) {
            $gsRoot = Join-Path $base 'gs'
            if (-not (Test-Path $gsRoot)) { continue }

            $candidates = Get-ChildItem $gsRoot -Directory |
              Where-Object { $_.Name -match '^gs\d+' } |
              Sort-Object Name -Descending

            foreach ($candidate in $candidates) {
              $exe = Join-Path $candidate.FullName 'bin\gswin64c.exe'
              if (Test-Path $exe) {
                $resolved = $candidate.FullName
                break
              }
            }

            if ($resolved) { break }
          }

          if (-not $resolved) {
            throw 'Cannot resolve GS_WIN_DIR from Program Files.'
          }

          "GS_WIN_DIR=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved GS_WIN_DIR=$resolved"

      - name: Build Tauri bundles
        run: npm run tauri:build -- ${{ matrix.bundle_args }}
        env:
          GS_MAC_PATH: /opt/homebrew/bin/gs

      - name: Build DMG manually (macOS)
        if: matrix.build_dmg
        shell: bash
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/PDF Compress GUI.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          DMG_PATH="$DMG_DIR/PDF Compress GUI_${{ github.run_number }}_macos.dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found: $APP_PATH"
            exit 1
          fi

          mkdir -p "$DMG_DIR"
          hdiutil create -volname "PDF Compress GUI" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          ls -lah "$DMG_DIR"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundles-*
          merge-multiple: true

      - name: List release assets
        run: ls -R release-assets

      - name: Create/Update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.msi
            release-assets/*.exe
